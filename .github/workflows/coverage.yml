name: Code Coverage

on:
  push:
    branches: [ main, phase-* ]
  pull_request:
    branches: [ main ]

jobs:
  coverage:
    name: Coverage Analysis
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Checkout common_system dependency
      uses: actions/checkout@v6
      with:
        repository: kcenon/common_system
        path: common_system
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Checkout thread_system dependency
      uses: actions/checkout@v6
      with:
        repository: kcenon/thread_system
        path: thread_system
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Checkout logger_system dependency
      uses: actions/checkout@v6
      with:
        repository: kcenon/logger_system
        path: logger_system
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install GCC 13 for std::format support
      run: |
        sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
        sudo apt-get update
        sudo apt-get install -y g++-13 gcc-13
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
        sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++-13 100
        sudo update-alternatives --install /usr/bin/cc cc /usr/bin/gcc-13 100
        sudo update-alternatives --install /usr/bin/gcov gcov /usr/bin/gcov-13 100
        g++ --version
        gcov --version

    - name: Build and install common_system
      run: |
        cd common_system
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_COMPILER=g++-13 \
          -DCMAKE_C_COMPILER=gcc-13 \
          -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/common_system_install"
        cmake --build build --parallel
        cmake --install build
        cd ..

    - name: Build and install thread_system
      run: |
        cd thread_system
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_COMPILER=g++-13 \
          -DCMAKE_C_COMPILER=gcc-13 \
          -DCMAKE_PREFIX_PATH="${GITHUB_WORKSPACE}/common_system_install" \
          -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/thread_system_install" \
          -DCMAKE_CXX_FLAGS="-I${GITHUB_WORKSPACE}/common_system_install/include" \
          -DUSE_STD_FORMAT=ON \
          -DBUILD_TESTS=OFF \
          -DBUILD_SAMPLES=OFF
        cmake --build build --parallel
        cmake --install build
        cd ..

    - name: Build and install logger_system
      run: |
        cd logger_system
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_COMPILER=g++-13 \
          -DCMAKE_C_COMPILER=gcc-13 \
          -DCMAKE_PREFIX_PATH="${GITHUB_WORKSPACE}/common_system_install;${GITHUB_WORKSPACE}/thread_system_install" \
          -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/logger_system_install" \
          -DCMAKE_CXX_FLAGS="-I${GITHUB_WORKSPACE}/common_system_install/include -I${GITHUB_WORKSPACE}/thread_system_install/include" \
          -DUSE_STD_FORMAT=ON \
          -DBUILD_TESTS=OFF \
          -DBUILD_SAMPLES=OFF
        cmake --build build --parallel
        cmake --install build
        cd ..

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build g++ libgtest-dev libgmock-dev lcov

    - name: Configure CMake with coverage
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_CXX_COMPILER=g++-13 \
          -DCMAKE_C_COMPILER=gcc-13 \
          -DCMAKE_PREFIX_PATH="${GITHUB_WORKSPACE}/common_system_install;${GITHUB_WORKSPACE}/thread_system_install;${GITHUB_WORKSPACE}/logger_system_install" \
          -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
          -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
          -DMONITORING_BUILD_TESTS=ON \
          -DMONITORING_BUILD_EXAMPLES=OFF \
          -DMONITORING_WITH_COMMON_SYSTEM=ON

    - name: Build with coverage
      run: cmake --build build --config Debug

    - name: Run tests
      run: |
        cd build
        ctest -C Debug --output-on-failure --verbose || true

    - name: Generate coverage report
      run: |
        cd build

        # Verify coverage instrumentation files exist
        echo "=== Coverage instrumentation check ==="
        GCNO_COUNT=$(find . -name "*.gcno" | wc -l)
        GCDA_COUNT=$(find . -name "*.gcda" | wc -l)
        echo "gcno files (compile-time): $GCNO_COUNT"
        echo "gcda files (runtime): $GCDA_COUNT"

        if [ "$GCDA_COUNT" -eq 0 ]; then
          echo "::warning::No .gcda files found — tests may not have generated coverage data"
        fi

        # Capture coverage data with explicit gcov-13 to match compiler version
        lcov --directory . --capture --output-file coverage.info \
          --gcov-tool gcov-13 \
          --ignore-errors mismatch,empty,unused \
          --rc branch_coverage=1

        # Extract only monitoring_system's own source files (src/ and include/)
        lcov --extract coverage.info \
          "${GITHUB_WORKSPACE}/src/*" \
          "${GITHUB_WORKSPACE}/include/*" \
          --output-file coverage_src.info \
          --ignore-errors unused \
          --rc branch_coverage=1

        # Remove any remaining test/example files (safety net)
        lcov --remove coverage_src.info \
          '*/test/*' '*/tests/*' '*/examples/*' '*/benchmarks/*' \
          --output-file coverage_filtered.info \
          --ignore-errors unused \
          --rc branch_coverage=1

        # Generate HTML report
        genhtml coverage_filtered.info --output-directory coverage_html \
          --ignore-errors inconsistent \
          --rc branch_coverage=1 || true

        # Print summary
        lcov --list coverage_filtered.info \
          --rc branch_coverage=1 || true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: ./build/coverage_filtered.info
        flags: unittests
        name: monitoring_system-coverage
        fail_ci_if_error: false
        verbose: true
        gcov_executable: gcov-13
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload coverage artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: |
          build/coverage.info
          build/coverage_filtered.info
          build/coverage_html/
        retention-days: 7

    - name: Coverage summary
      if: always()
      run: |
        echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f build/coverage_filtered.info ]; then
          echo "Coverage data collected successfully." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Phase 0 Target: Establish baseline coverage" >> $GITHUB_STEP_SUMMARY
          echo "Phase 5 Target: 80%+ coverage" >> $GITHUB_STEP_SUMMARY
        else
          echo "No coverage data generated." >> $GITHUB_STEP_SUMMARY
        fi
